// ─── hint: ask Stockfish for a good move for the side the player controls ───
document.getElementById('hint-btn').addEventListener('click', ()=>{
  if (G.over || G.thinking || G.gs.turn !== G.playerColor) return;
  if (sf && sfReady) {
    // Temporary full-strength search for a suggestion
    const fen = boardToFen(G.board, G.gs);
    let hintMate = null;
    sfCurrentSearch = line => {
      const mateM = line.match(/\bscore mate (-?\d+)/);
      if (mateM) hintMate = parseInt(mateM[1]);
      if (line.startsWith('bestmove')) {
        sfCurrentSearch = null;
        const sfMv = line.split(' ')[1];
        if (!sfMv || sfMv === '(none)') return;
        const mv = sfMoveToInternal(sfMv, G.board);
        if (!mv) return;
        _hint = { from: mv.from, to: mv.to };
        render();
        setTimeout(clearHint, 3500);
        setTimeout(render, 3520);
      }
    };
    sf.postMessage('stop');
    // Hints are always full-strength regardless of selected opponent.
    sf.postMessage('setoption name UCI_LimitStrength value false');
    sf.postMessage('setoption name Skill Level value 20');
    sf.postMessage('position fen ' + fen);
    sf.postMessage('go movetime 300');
  } else {
    // Fallback: built-in engine suggestion for the player's colour. evalPos
    // returns white-POV; multiply by _pSign() so we can always "maximize".
    const moves = getLegal(G.board, G.playerColor, G.gs);
    if (!moves.length) return;
    const sign = _pSign();
    let best = null, bv = -Infinity;
    for (const m of moves) {
      const v = evalPos(applyMove(G.board, m)) * sign;
      if (v > bv) { bv = v; best = m; }
    }
    if (best) {
      _hint = { from: best.from, to: best.to };
      render();
      setTimeout(clearHint, 3500);
      setTimeout(render, 3520);
    }
  }
});

// ─── undo: revert the last player+bot move pair ───────────────────────────
document.getElementById('undo-btn').addEventListener('click', ()=>{
  if (G.viewPly != null) navigateHistory(null);    // exit review first
  if (G.over || G.thinking) return;
  // Each commitMove pushes one snapshot (the state just before the player moved).
  // Undoing means restoring the state that was saved *before* the player's last move.
  // But commitMove already played both the player's move and (asynchronously) the bot's.
  // To roll back a full ply-pair, take the most recent snapshot.
  if (!G.snapshots.length) return;
  const s = G.snapshots.pop();
  G.board     = s.board;
  G.gs        = s.gs;
  G.hist      = s.hist;
  G.prevEval  = s.prevEval;
  G.lastF     = s.lastF;
  G.lastT     = s.lastT;
  G.positions = s.positions;
  G.moveNum   = s.moveNum;
  G.sel       = null; G.legFrom = [];
  G.preSel    = null; G.preTargets = []; G.premove = null;
  G.arrows    = [];
  // Trim per-ply snapshots back to match — boardHistory length = hist.length + 1.
  if (G.boardHistory && G.boardHistory.length > G.hist.length + 1){
    G.boardHistory.length = G.hist.length + 1;
  }
  G.allLeg    = getLegal(G.board, G.playerColor, G.gs);
  Audio_.move();
  render();
  updateMaterialDiff();
  // Refresh the eval bar
  if (sf && sfReady) {
    sfEval(boardToFen(G.board, G.gs), G.playerColor,
           (whiteAdv, whiteMate) => {
             updateEvalBar(whiteAdv, whiteMate);
             updateEvalPortrait(whiteAdv);
           });
  } else {
    const ev = evalPos(G.board);
    updateEvalBar(ev);
    updateEvalPortrait(ev);
  }
});

// ─── flip: swap board orientation, and swap sides if move 1 hasn't happened ───
//
// Pre-game: pressing Flip switches which colour the player controls. The bot
//   takes the empty side and opens if the new playerColor is black.
// Mid-game / after game-over: Flip is a pure visual mirror as before — your
//   pieces just swap to the top half of the screen.
//
// In both cases the eval bar's text needs a refresh so its sign matches the
// new orientation; updateEvalBar handles the sign flip via G.flipped.
document.getElementById('flip-btn').addEventListener('click', ()=>{
  if (G.hist.length === 0 && !G.over){
    G.playerColor = G.playerColor === 'white' ? 'black' : 'white';
    G.flipped     = G.playerColor === 'black';
    G.allLeg      = getLegal(G.board, G.playerColor, G.gs);
    G.preSel = null; G.preTargets = []; G.premove = null;
    G.arrows = [];
    _recentLines.length = 0;
    _lastDlgMove = -5;
    render();
    updateEvalBar(G.prevEval || 0, G.lastMate || null);
    say(pick('opening'));
    if (G.gs.turn !== G.playerColor){
      setTimeout(() => botFirstMove(), 800);
    }
  } else {
    G.flipped = !G.flipped;
    render();
    updateEvalBar(G.prevEval || 0, G.lastMate || null);
  }
});

// ─── sound toggle ─────────────────────────────────────────────────────────
document.getElementById('snd-btn').addEventListener('click', ()=>{
  Audio_.enabled = !Audio_.enabled;
  const btn = document.getElementById('snd-btn');
  btn.classList.toggle('off', !Audio_.enabled);
  btn.innerHTML = Audio_.enabled ? '&#128266;' : '&#128263;';
  if (Audio_.enabled) Audio_.move(); // little confirmation tick
});

// ─── PGN export ──────────────────────────────────────────────────────────
// Builds a standard PGN string from the active game and copies it to the
// clipboard. Tags are minimal but valid: Event/Site/Date/White/Black/Result.
// The body uses the SAN moves already in G.hist with one-based move numbers
// and a result token at the end ('*' if the game's still in progress).
function _gameResult(){
  if (!G.over) return '*';
  const title = (document.getElementById('go-title').textContent || '').trim();
  // 'You Win!' / '<Char> Wins' / 'Draw' — map to PGN result tokens.
  if (title.indexOf('You Win') !== -1) return G.playerColor === 'white' ? '1-0' : '0-1';
  if (title.indexOf('Wins')    !== -1) return G.playerColor === 'white' ? '0-1' : '1-0';
  if (title.indexOf('Draw')    !== -1) return '1/2-1/2';
  return '*';
}
function _todayPGNDate(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}
function generatePGN(){
  const ch        = activeChar();
  const playerNm  = 'Player';
  const whiteName = G.playerColor === 'white' ? playerNm : ch.name;
  const blackName = G.playerColor === 'white' ? ch.name  : playerNm;
  const result    = _gameResult();
  const tags = [
    `[Event "Casual Game"]`,
    `[Site "Arisu Chess"]`,
    `[Date "${_todayPGNDate()}"]`,
    `[White "${whiteName}"]`,
    `[Black "${blackName}"]`,
    `[Result "${result}"]`,
  ];
  // Move text: "1. e4 c5 2. Nf3 d6 ..."  Wraps at ~80 chars per PGN convention.
  const tokens = [];
  for (let i = 0; i < G.hist.length; i += 2){
    tokens.push((i/2 + 1) + '.');
    tokens.push(G.hist[i]);
    if (i + 1 < G.hist.length) tokens.push(G.hist[i+1]);
  }
  tokens.push(result);
  let body = '', line = '';
  for (const t of tokens){
    if (line.length + t.length + 1 > 80){ body += line.trimEnd() + '\n'; line = ''; }
    line += t + ' ';
  }
  body += line.trimEnd();
  return tags.join('\n') + '\n\n' + body + '\n';
}
async function copyPGN(){
  const pgn = generatePGN();
  try {
    await navigator.clipboard.writeText(pgn);
    return true;
  } catch (e) {
    // Fallback for older browsers / non-secure contexts.
    const ta = document.createElement('textarea');
    ta.value = pgn;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch(_){}
    ta.remove();
    return ok;
  }
}
document.getElementById('pgn-btn').addEventListener('click', async ()=>{
  const btn = document.getElementById('pgn-btn');
  const ok  = await copyPGN();
  const orig = btn.textContent;
  btn.textContent = ok ? 'Copied' : 'Failed';
  setTimeout(() => { btn.textContent = orig; }, 1500);
});

// Initialize the AudioContext on first user gesture (browser autoplay policy).
// Any click on the page unlocks it.
document.addEventListener('click', function unlockAudio(){
  if (!Audio_.ctx) Audio_.init();
  if (Audio_.ctx && Audio_.ctx.state === 'suspended') Audio_.ctx.resume();
  document.removeEventListener('click', unlockAudio);
}, { once:true });

// ─── keyboard shortcuts ───────────────────────────────────────────────────
document.addEventListener('keydown', (e)=>{
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')) return;
  const k = e.key.toLowerCase();
  if (k === 'n') { e.preventDefault(); initGame(false); }
  else if (k === 'u') { e.preventDefault(); document.getElementById('undo-btn').click(); }
  else if (k === 'h') { e.preventDefault(); document.getElementById('hint-btn').click(); }
  else if (k === 'f') { e.preventDefault(); document.getElementById('flip-btn').click(); }
  else if (k === 'm') { e.preventDefault(); document.getElementById('snd-btn').click(); }
  // ── history navigation ──
  else if (e.key === 'End')   { e.preventDefault(); navigateHistory(null); }
  else if (e.key === 'Home')  { e.preventDefault(); navigateHistory(0); }
  else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    const cur = (G.viewPly != null) ? G.viewPly : G.boardHistory.length - 1;
    if (cur > 0) navigateHistory(cur - 1);
  }
  else if (e.key === 'ArrowRight') {
    e.preventDefault();
    const cur = (G.viewPly != null) ? G.viewPly : G.boardHistory.length - 1;
    const last = G.boardHistory.length - 1;
    if (cur < last) navigateHistory(cur + 1 >= last ? null : cur + 1);
  }
  else if (k === 'escape') {
    if (G.viewPly != null){ navigateHistory(null); return; }
    G.sel = null; G.legFrom = [];
    G.preSel = null; G.preTargets = []; G.premove = null;
    G.arrows = [];
    render();
  }
});

setupArrowHandlers();
setupDragHandlers();
initGame();
loadStockfish(); // loads asynchronously; minimax is used as fallback until ready
</script>
